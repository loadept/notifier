name: Notify

on:
  workflow_call:
    inputs:
      status:
        type: string
        required: true
      repo:
        type: string
        required: true
      branch:
        type: string
        required: true
      commit:
        type: string
        required: true
      actor:
        type: string
        required: true
      message:
        type: string
        required: true
    secrets:
      NOTIFY_SECRET:
        required: true
      NOTIFY_WEBHOOK:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        env:
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
          NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
        run: |
          TIMESTAMP=$(date +%s)
          BODY=$(printf '{"source":"github","event":"deploy","status":"%s","meta":{"repo":"%s","commit":"%s","branch":"%s","actor":"%s","message":"%s"}}' \
            "${{ inputs.status }}" \
            "${{ inputs.repo }}" \
            "${{ inputs.commit }}" \
            "${{ inputs.branch }}" \
            "${{ inputs.actor }}" \
            "${{ inputs.message }}")
          MESSAGE=$(printf 'POST\n/notify\n%s\n%s' "$TIMESTAMP" "$BODY")
          SIGNATURE=$(printf '%s' "$MESSAGE" | openssl dgst -sha256 -hmac "$NOTIFY_SECRET" | cut -d' ' -f2)
          curl -X POST "$NOTIFY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -H "X-Signature: $SIGNATURE" \
            -H "X-Timestamp: $TIMESTAMP" \
            -d "$BODY"
